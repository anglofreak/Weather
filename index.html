<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=800, height=480">

<style>
html, body {
  margin: 0;
  padding: 0;
  background: transparent !important; /* ✅ transparent */
  overflow: hidden;
}

/* center icon */
.container {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* icon */
.icon {
  font-size: 120px;
}
</style>
</head>

<body>

<div class="container" id="app">⏳</div>

<script>
const API = "https://api-open.data.gov.sg/v2/real-time/api/two-hr-forecast";

/* Singapore time */
function getSingaporeHour() {
  const now = new Date();
  return new Date(
    now.toLocaleString("en-US", { timeZone: "Asia/Singapore" })
  ).getHours();
}

function isDayTime() {
  const h = getSingaporeHour();
  return h >= 7 && h < 19;
}

/* Weather → icon */
function mapWeather(f) {
  if (!f) return "❓";

  f = f.toLowerCase();
  const day = isDayTime();

  if (f.includes("thunder")) return "⛈️";

  if (f.includes("heavy")) return "🌧️";
  if (f.includes("light") && (f.includes("rain") || f.includes("drizzle")))
    return day ? "🌦️" : "🌧️";
  if (f.includes("rain") || f.includes("showers")) return "🌧️";

  if (f.includes("wind") || f.includes("gust")) return "🌬️";

  if (f.includes("mist") || f.includes("haze")) return "🌫️";
  if (f.includes("fog")) return "🌁";

  if (f.includes("partly")) return day ? "⛅" : "🌙☁️";
  if (f.includes("cloud") || f.includes("overcast")) return "☁️";

  if (f.includes("sun") || f.includes("fair") || f.includes("clear"))
    return day ? "☀️" : "🌙";

  return "❓";
}

async function load() {
  try {
    const res = await fetch(API);
    const json = await res.json();

    const all = json.data.items[0].forecasts;
    const bukit = all.find(a => a.area === "Bukit Timah");

    if (!bukit) {
      document.getElementById("app").innerHTML = "❓";
      return;
    }

    const icon = mapWeather(bukit.forecast);

    document.getElementById("app").innerHTML =
      `<div class="icon">${icon}</div>`;

  } catch (e) {
    document.getElementById("app").innerHTML = "❓";
  }
}

/* run */
load();
setInterval(load, 300000);
</script>

</body>
</html>
